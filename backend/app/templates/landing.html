<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CropCast — Smart Crop Yield Prediction</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800;900&display=swap" rel="stylesheet">
  <script>
    (function() {
      var theme = localStorage.getItem('theme') || 'dark';
      document.documentElement.setAttribute('data-theme', theme);
    })();
  </script>
  <style>
    :root {
      --green: #2e7d32;
      --lightGreen: #4caf50;
      --bg: #f8fafc;
      --text: #1e293b;
      --text-muted: #64748b;
      --border: #e2e8f0;
      --card-bg: rgba(255, 255, 255, 0.7);
      --glow: rgba(46, 125, 50, 0.4);
    }
    [data-theme='dark'] {
      --bg: #0f172a;
      --text: #f8fafc;
      --text-muted: #94a3b8;
      --border: #334155;
      --card-bg: rgba(30, 41, 59, 0.6);
      --glow: rgba(76, 175, 80, 0.5);
      --green: #4ade80;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Outfit', -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* Animated background */
    .bg-glow {
      position: fixed;
      border-radius: 50%;
      filter: blur(120px);
      opacity: 0.4;
      animation: float 8s ease-in-out infinite;
      pointer-events: none;
    }
    .bg-glow.g1 {
      width: 500px; height: 500px;
      background: rgba(46, 125, 50, 0.15);
      top: -150px; left: -100px;
      animation-delay: 0s;
    }
    .bg-glow.g2 {
      width: 400px; height: 400px;
      background: rgba(76, 175, 80, 0.1);
      bottom: -100px; right: -80px;
      animation-delay: -3s;
    }
    .bg-glow.g3 {
      width: 300px; height: 300px;
      background: rgba(46, 125, 50, 0.08);
      top: 50%; left: 60%;
      animation-delay: -5s;
    }
    @keyframes float {
      0%, 100% { transform: translate(0, 0) scale(1); }
      33% { transform: translate(30px, -20px) scale(1.05); }
      66% { transform: translate(-20px, 15px) scale(0.95); }
    }

    /* Particles */
    .particle {
      position: fixed;
      width: 3px; height: 3px;
      background: var(--green);
      border-radius: 50%;
      opacity: 0;
      pointer-events: none;
      animation: rise 6s linear infinite;
    }
    @keyframes rise {
      0% { opacity: 0; transform: translateY(100vh) scale(0); }
      10% { opacity: 0.6; }
      90% { opacity: 0.2; }
      100% { opacity: 0; transform: translateY(-20vh) scale(1); }
    }

    .landing-card {
      position: relative;
      z-index: 2;
      text-align: center;
      padding: 60px 80px;
      border-radius: 32px;
      background: var(--card-bg);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--border);
      box-shadow: 0 25px 60px rgba(0, 0, 0, 0.08), 0 0 40px var(--glow);
      animation: cardIn 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      opacity: 0;
      transform: translateY(30px) scale(0.95);
      max-width: 520px;
      width: 90%;
    }
    @keyframes cardIn {
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    .logo-emoji {
      font-size: 56px;
      display: block;
      margin-bottom: 16px;
      animation: wave 2s ease-in-out infinite;
    }
    @keyframes wave {
      0%, 100% { transform: rotate(0deg); }
      25% { transform: rotate(-8deg); }
      75% { transform: rotate(8deg); }
    }

    .brand-name {
      font-size: 3.2rem;
      font-weight: 900;
      letter-spacing: -0.04em;
      background: linear-gradient(135deg, #1b5e20, #4caf50, #81c784);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1.1;
      margin-bottom: 12px;
    }

    .tagline {
      font-size: 1.05rem;
      color: var(--text-muted);
      font-weight: 400;
      line-height: 1.6;
      margin-bottom: 40px;
    }

    .enter-btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 16px 48px;
      font-size: 1.1rem;
      font-weight: 700;
      font-family: 'Outfit', sans-serif;
      color: #fff;
      background: linear-gradient(135deg, #1b5e20, #2e7d32, #388e3c);
      border: none;
      border-radius: 16px;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: 0 8px 24px rgba(46, 125, 50, 0.3);
      position: relative;
      overflow: hidden;
    }
    .enter-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, transparent, rgba(255,255,255,0.15), transparent);
      transform: translateX(-100%);
      transition: transform 0.5s ease;
    }
    .enter-btn:hover {
      transform: translateY(-3px) scale(1.03);
      box-shadow: 0 12px 36px rgba(46, 125, 50, 0.45);
    }
    .enter-btn:hover::before {
      transform: translateX(100%);
    }
    .enter-btn:active {
      transform: translateY(-1px) scale(1);
    }
    .enter-btn .arrow {
      transition: transform 0.3s ease;
    }
    .enter-btn:hover .arrow {
      transform: translateX(4px);
    }

    .footer-text {
      margin-top: 32px;
      font-size: 0.78rem;
      color: var(--text-muted);
      opacity: 0.6;
      letter-spacing: 0.03em;
    }

    .stats-row {
      display: flex;
      justify-content: center;
      gap: 32px;
      margin-bottom: 32px;
      animation: fadeUp 1s 0.4s both;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .stat {
      text-align: center;
    }
    .stat-val {
      font-size: 1.4rem;
      font-weight: 800;
      color: var(--green);
    }
    .stat-lbl {
      font-size: 0.72rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-top: 2px;
    }
  </style>
</head>
<body>
  <!-- Background effects -->
  <div class="bg-glow g1"></div>
  <div class="bg-glow g2"></div>
  <div class="bg-glow g3"></div>

  <div class="landing-card">
    <span class="logo-emoji">🌾</span>
    <div class="brand-name">CropCast</div>
    <p class="tagline">Smart Crop Yield Prediction powered by Machine Learning.<br/>Analyze 2,20,000+ agricultural records instantly.</p>

    <div class="stats-row">
      <div class="stat">
        <div class="stat-val">2.2L+</div>
        <div class="stat-lbl">Records</div>
      </div>
      <div class="stat">
        <div class="stat-val">10</div>
        <div class="stat-lbl">Crops</div>
      </div>
      <div class="stat">
        <div class="stat-val">AI</div>
        <div class="stat-lbl">Powered</div>
      </div>
    </div>

    <a href="/predict" id="enterBtn">
      <button class="enter-btn">
        Enter Dashboard
        <span class="arrow">→</span>
      </button>
    </a>

    <div class="footer-text">DWDM Mini Project · 2025</div>
  </div>

  <script>
    // Create floating particles
    for (let i = 0; i < 20; i++) {
      const p = document.createElement('div');
      p.className = 'particle';
      p.style.left = Math.random() * 100 + '%';
      p.style.animationDelay = Math.random() * 6 + 's';
      p.style.animationDuration = (4 + Math.random() * 4) + 's';
      p.style.width = p.style.height = (2 + Math.random() * 3) + 'px';
      document.body.appendChild(p);
    }

    // Set predict link dynamically
    const enterBtn = document.getElementById('enterBtn');
    enterBtn.href = `http://${window.location.hostname}:5200`;
  </script>
</body>
</html>
